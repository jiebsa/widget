<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>藏晝閣</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --champagne: rgba(228, 210, 171, 0.92);
      --champagne-soft: rgba(228, 210, 171, 0.68);
      --champagne-faint: rgba(228, 210, 171, 0.22);
      --white-soft: rgba(255,255,255,0.80);
      --white-faint: rgba(255,255,255,0.38);
      --shadow: rgba(0,0,0,0.28);
    }

    *{ box-sizing: border-box; }
    html, body{
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: transparent;
      overflow: hidden;
    }

    body{
      font-family: "Inter", "Noto Serif TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    .frame{
      position: relative;
      width: 100%;
      min-height: 100vh;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(8,12,22,0.08) 0%, rgba(8,12,22,0.00) 18%, rgba(8,12,22,0.18) 100%),
        url('bg.png') center center / cover no-repeat;
      isolation: isolate;
    }

    .frame::before{
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 24% 22%, rgba(255,255,255,0.13) 0 1px, transparent 2px),
        radial-gradient(circle at 68% 36%, rgba(228,210,171,0.16) 0 1px, transparent 2px),
        radial-gradient(circle at 58% 18%, rgba(255,255,255,0.13) 0 1px, transparent 2px),
        radial-gradient(circle at 74% 66%, rgba(228,210,171,0.18) 0 1px, transparent 2px),
        radial-gradient(circle at 88% 20%, rgba(255,255,255,0.12) 0 1px, transparent 2px),
        radial-gradient(circle at 8% 70%, rgba(255,255,255,0.14) 0 1px, transparent 2px);
      pointer-events: none;
      z-index: 1;
    }

    .frame::after{
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.02) 24%, rgba(0,0,0,0.00) 44%, rgba(0,0,0,0.20) 100%),
        radial-gradient(circle at 18% 26%, rgba(255,250,240,0.16), rgba(255,250,240,0.00) 32%);
      pointer-events: none;
      z-index: 1;
    }

    .corner, .corner::before{
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: var(--champagne-soft);
      z-index: 3;
      pointer-events: none;
    }

    .tl{ top: 18px; left: 18px; border-top: 1px solid; border-left: 1px solid; }
    .tr{ top: 18px; right: 18px; border-top: 1px solid; border-right: 1px solid; }
    .bl{ bottom: 18px; left: 18px; border-bottom: 1px solid; border-left: 1px solid; }
    .br{ bottom: 18px; right: 18px; border-bottom: 1px solid; border-right: 1px solid; }

    .hud-line{
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--champagne-faint), transparent);
      z-index: 2;
      pointer-events: none;
    }
    .hud-line.top{ left: 23%; right: 8%; top: 74px; }
    .hud-line.mid{ left: 5%; width: 33%; top: 315px; }
    .hud-line.bottom{ right: 5%; width: 30%; bottom: 88px; }

    .left-top{
      position: absolute;
      top: 36px;
      left: 54px;
      z-index: 4;
      color: var(--champagne);
      max-width: min(42vw, 560px);
      text-shadow: 0 3px 18px rgba(0,0,0,.18);
    }

    .quote-tag{
      font-size: 12px;
      letter-spacing: .42em;
      text-transform: uppercase;
      color: var(--white-faint);
      margin-bottom: 30px;
    }

    .quote{
      font-family: "Noto Serif TC", serif;
      font-size: clamp(26px, 2.8vw, 48px);
      line-height: 1.45;
      letter-spacing: .12em;
      font-weight: 500;
      color: rgba(245, 236, 220, 0.88);
      margin: 0;
    }

    .quote-author{
      margin-top: 22px;
      font-family: "Noto Serif TC", serif;
      font-size: clamp(16px, 1.1vw, 22px);
      letter-spacing: .35em;
      color: var(--champagne-soft);
    }

    .right-bottom{
      position: absolute;
      right: 52px;
      bottom: 44px;
      z-index: 4;
      text-align: right;
      color: var(--champagne);
      text-shadow: 0 4px 20px rgba(0,0,0,.22);
    }

    .archive-title{
      font-family: "Noto Serif TC", serif;
      font-size: clamp(26px, 2.2vw, 40px);
      font-weight: 600;
      letter-spacing: .28em;
      margin-bottom: 6px;
      color: rgba(245,236,220,0.88);
    }

    .archive-sub{
      font-size: 12px;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--white-faint);
      margin-bottom: 22px;
    }

    .reunion-label{
      font-family: "Noto Serif TC", serif;
      font-size: clamp(22px, 1.7vw, 30px);
      letter-spacing: .22em;
      color: rgba(245,236,220,0.88);
      margin-bottom: 6px;
    }

    .day-row{
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
      gap: 16px;
    }

    .day-prefix, .day-suffix{
      font-family: "Noto Serif TC", serif;
      font-size: clamp(40px, 4vw, 72px);
      font-weight: 600;
      color: var(--champagne-soft);
      letter-spacing: .08em;
      line-height: 1;
    }

    .day-number{
      font-size: clamp(72px, 8vw, 138px);
      line-height: .9;
      font-weight: 700;
      letter-spacing: .06em;
      color: var(--champagne);
      text-shadow: 0 0 26px rgba(228,210,171,0.16);
    }

    .date-range{
      margin-top: 16px;
      font-size: clamp(16px, 1vw, 20px);
      letter-spacing: .18em;
      color: rgba(245,236,220,0.84);
    }

    .system{
      position: absolute;
      right: 26px;
      top: 34px;
      z-index: 4;
      text-align: right;
      color: var(--white-faint);
      font-size: 11px;
      letter-spacing: .24em;
      line-height: 2;
      text-transform: uppercase;
    }

    .system .online{
      font-size: 13px;
      color: rgba(245,236,220,0.85);
      margin-bottom: 10px;
    }

    .left-side{
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%) rotate(180deg);
      writing-mode: vertical-rl;
      z-index: 3;
      font-size: 11px;
      letter-spacing: .28em;
      color: var(--white-faint);
      text-transform: uppercase;
    }

    .left-bottom{
      position: absolute;
      left: 54px;
      bottom: 36px;
      z-index: 4;
      color: var(--white-faint);
      font-size: 13px;
      letter-spacing: .28em;
      text-transform: uppercase;
    }

    .left-bottom .id{
      margin-top: 6px;
      font-size: 11px;
      letter-spacing: .4em;
      color: var(--champagne-soft);
    }

    .ring{
      position: absolute;
      right: 22px;
      bottom: 82px;
      width: min(22vw, 290px);
      height: min(22vw, 290px);
      border-radius: 50%;
      border: 1px solid rgba(228,210,171,0.18);
      clip-path: inset(55% 0 0 42%);
      z-index: 2;
      pointer-events: none;
    }

    .ring::before, .ring::after{
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(228,210,171,0.14);
      inset: 18%;
    }

    .ring::after{
      inset: 38%;
    }

    .spark{
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(245,236,220,0.95);
      box-shadow: 0 0 12px rgba(245,236,220,0.55);
      z-index: 2;
      pointer-events: none;
    }
    .spark.s1{ right: 112px; bottom: 246px; }
    .spark.s2{ right: 56px; bottom: 174px; }
    .spark.s3{ right: 168px; bottom: 120px; }

    @media (max-width: 980px){
      .frame{ min-height: 76vw; height: auto; aspect-ratio: 16 / 9; }
      .left-top{ top: 28px; left: 28px; max-width: 50vw; }
      .right-bottom{ right: 26px; bottom: 26px; }
      .quote-tag{ margin-bottom: 18px; }
      .archive-sub{ margin-bottom: 14px; }
      .date-range{ margin-top: 10px; }
      .system{ display: none; }
      .left-bottom{ left: 28px; bottom: 24px; }
    }

    @media (max-width: 700px){
      .frame{ aspect-ratio: 4 / 5; min-height: 0; }
      .left-top{
        top: 24px;
        left: 22px;
        right: 22px;
        max-width: none;
      }
      .quote{
        font-size: clamp(22px, 5vw, 34px);
        line-height: 1.5;
      }
      .quote-author{ margin-top: 14px; }
      .right-bottom{
        left: 22px;
        right: 22px;
        bottom: 24px;
        text-align: left;
      }
      .day-row{
        justify-content: flex-start;
        gap: 10px;
      }
      .hud-line.top{ left: 18px; right: 18px; top: 70px; }
      .hud-line.mid{ display: none; }
      .hud-line.bottom{ left: 18px; right: 18px; width: auto; bottom: 102px; }
      .left-side, .left-bottom, .ring, .spark{ display: none; }
      .archive-title{ letter-spacing: .18em; }
    }
  </style>
</head>
<body>
  <main class="frame">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <div class="hud-line top"></div>
    <div class="hud-line mid"></div>
    <div class="hud-line bottom"></div>

    <section class="left-top">
      <div class="quote-tag">Archive</div>
      <p class="quote">「只要我相信她存在，<br>她一直存在。」</p>
      <div class="quote-author">— 夏以晝</div>
    </section>

    <section class="right-bottom">
      <div class="archive-title">藏 晝 閣</div>
      <div class="archive-sub">ZANG ZHOU ARCHIVE</div>
      <div class="reunion-label">與夏以晝重逢</div>
      <div class="day-row">
        <span class="day-prefix">第</span>
        <span class="day-number" id="days">523</span>
        <span class="day-suffix">日</span>
      </div>
      <div class="date-range"><span id="startDate">2025.01.22</span> — <span id="todayDate">2026.07.08</span></div>
    </section>

    <section class="system">
      <div class="online">SYSTEM ONLINE</div>
      <div>DATA SYNC · 100%</div>
      <div>MEMORY · STABLE</div>
      <div>SIGNAL · GOOD</div>
    </section>

    <div class="left-side">CLASSIFIED</div>

    <div class="left-bottom">
      <div>ZANG ZHOU ARCHIVE</div>
      <div class="id">001 ■■■■</div>
    </div>

    <div class="ring"></div>
    <span class="spark s1"></span>
    <span class="spark s2"></span>
    <span class="spark s3"></span>
  </main>

  <script>
    const startDate = new Date("2025-01-22T00:00:00+08:00");

    function formatDate(date){
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}.${m}.${d}`;
    }

    function updateCounter(){
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const start = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
      const diff = Math.floor((today - start) / 86400000);

      document.getElementById("days").textContent = diff;
      document.getElementById("startDate").textContent = formatDate(start);
      document.getElementById("todayDate").textContent = formatDate(today);
    }

    updateCounter();
  </script>
</body>
</html>
