<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>藏晝閣｜重逢日誌</title>
  <style>
    :root {
      --gold: #d8b982;
      --gold-soft: rgba(216, 185, 130, .55);
      --gold-faint: rgba(216, 185, 130, .18);
      --text: #f5efe4;
      --muted: rgba(245, 239, 228, .68);
      --bg1: #0c1018;
      --bg2: #17110d;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif TC", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .wrap {
      width: 100%;
      min-height: 260px;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .card {
      position: relative;
      width: min(760px, 100%);
      min-height: 236px;
      padding: 30px 24px 28px;
      text-align: center;
      border: 1px solid var(--gold-faint);
      border-radius: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(216,185,130,.20), transparent 34%),
        radial-gradient(circle at 16% 18%, rgba(117,154,255,.13), transparent 30%),
        linear-gradient(135deg, rgba(12,16,24,.94), rgba(23,17,13,.92));
      box-shadow:
        0 18px 44px rgba(0,0,0,.28),
        inset 0 0 40px rgba(216,185,130,.04);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -80px;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.42) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(216,185,130,.45) 0 1px, transparent 1.4px);
      background-size: 88px 88px, 132px 132px;
      background-position: 0 0, 28px 42px;
      opacity: .20;
      animation: drift 26s linear infinite;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(216,185,130,.16);
      border-radius: 18px;
      pointer-events: none;
    }

    @keyframes drift {
      from { transform: translate3d(0,0,0); }
      to { transform: translate3d(44px, -36px,0); }
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .kicker {
      margin: 0 0 8px;
      font-size: 11px;
      letter-spacing: .48em;
      color: var(--muted);
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 600;
      letter-spacing: .26em;
      color: var(--text);
      text-shadow: 0 0 18px rgba(216,185,130,.22);
    }

    .line {
      width: min(280px, 62%);
      height: 1px;
      margin: 16px auto 18px;
      background: linear-gradient(90deg, transparent, var(--gold-soft), transparent);
    }

    .label {
      font-size: 14px;
      letter-spacing: .18em;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .days {
      font-size: clamp(46px, 11vw, 82px);
      line-height: .95;
      font-weight: 700;
      letter-spacing: .05em;
      color: var(--gold);
      text-shadow: 0 0 24px rgba(216,185,130,.28);
      animation: breathe 3.6s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: .90; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.018); }
    }

    .date {
      margin-top: 10px;
      font-size: 12px;
      letter-spacing: .12em;
      color: rgba(245,239,228,.56);
    }

    .quote {
      max-width: 560px;
      margin: 18px auto 0;
      font-size: clamp(13px, 3.4vw, 15px);
      line-height: 1.9;
      letter-spacing: .08em;
      color: rgba(245,239,228,.80);
    }

    .corner {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: rgba(216,185,130,.55);
      z-index: 2;
    }
    .tl { top: 17px; left: 17px; border-top: 1px solid; border-left: 1px solid; }
    .tr { top: 17px; right: 17px; border-top: 1px solid; border-right: 1px solid; }
    .bl { bottom: 17px; left: 17px; border-bottom: 1px solid; border-left: 1px solid; }
    .br { bottom: 17px; right: 17px; border-bottom: 1px solid; border-right: 1px solid; }

    @media (max-width: 520px) {
      .wrap { min-height: 240px; padding: 10px; }
      .card { min-height: 220px; border-radius: 20px; padding: 26px 18px; }
      h1 { letter-spacing: .20em; }
      .quote { margin-top: 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card" aria-label="藏晝閣重逢計時">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>

      <div class="content">
        <p class="kicker">Archive</p>
        <h1>藏晝閣</h1>
        <div class="line"></div>

        <div class="label">與夏以晝重逢</div>
        <div class="days" id="days">第 — 日</div>
        <div class="date">2025.01.22 — Today</div>

        <p class="quote">「只要我相信她存在，她一直存在。」</p>
      </div>
    </section>
  </div>

  <script>
    const startDate = new Date("2025-01-22T00:00:00+08:00");

    function updateDays() {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const start = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
      const days = Math.floor((today - start) / 86400000);
      document.getElementById("days").textContent = `第 ${days} 日`;
    }

    updateDays();
  </script>
</body>
</html>
