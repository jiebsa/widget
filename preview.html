<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>藏晝閣｜重逢計時</title>
  <style>
    :root {
      --bg: rgba(255,255,255,0);
      --text: #2f2a24;
      --muted: #8a8178;
      --line: #d8c8b4;
      --accent: #b28a55;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif TC", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
    }

    .card {
      box-sizing: border-box;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 24px 30px;
      text-align: center;
      border: 1px solid rgba(178,138,85,.28);
      border-radius: 22px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,245,230,.68), rgba(255,255,255,.18) 52%, rgba(255,255,255,0) 100%),
        linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.42));
      box-shadow: 0 10px 30px rgba(70, 50, 25, .07);
    }

    .kicker {
      letter-spacing: .42em;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .title {
      font-size: 30px;
      letter-spacing: .18em;
      font-weight: 600;
      margin: 0 0 14px;
    }

    .divider {
      width: 120px;
      height: 1px;
      margin: 0 auto 18px;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
    }

    .days-label {
      font-size: 15px;
      color: var(--muted);
      letter-spacing: .12em;
      margin-bottom: 4px;
    }

    .days {
      font-size: clamp(44px, 12vw, 78px);
      line-height: 1;
      font-weight: 700;
      letter-spacing: .02em;
      color: var(--accent);
      margin: 2px 0 8px;
    }

    .date {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .08em;
      margin-bottom: 18px;
    }

    .quote {
      font-size: 14px;
      line-height: 1.8;
      letter-spacing: .06em;
      color: #5f554b;
      margin: 0 auto;
      max-width: 520px;
    }

    @media (max-width: 520px) {
      .card { padding: 24px 18px; border-radius: 18px; }
      .title { font-size: 26px; }
      .quote { font-size: 13px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="kicker">Archive</div>
    <h1 class="title">藏晝閣</h1>
    <div class="divider"></div>

    <div class="days-label">與夏以晝重逢</div>
    <div class="days"><span id="days">—</span></div>
    <div class="date">2025.01.22 — Today</div>

    <p class="quote">「只要我相信她存在，她一直存在。」</p>
  </main>

  <script>
    const startDate = new Date("2025-01-22T00:00:00+08:00");

    function updateDays() {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const start = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
      const diff = today - start;
      const days = Math.floor(diff / 86400000);
      document.getElementById("days").textContent = `第 ${days} 日`;
    }

    updateDays();
  </script>
</body>
</html>
